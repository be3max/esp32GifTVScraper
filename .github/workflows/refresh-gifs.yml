name: Refresh GIF URLs

on:
  schedule:
    # Run weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  scrape-gifs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch and update GIFs
        env:
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TAGS: ${{ vars.TAGS }}
          FETCH_LIMIT: ${{ vars.FETCH_LIMIT }}
          MAX_OFFSET: ${{ vars.MAX_OFFSET }}
          TARGET_COUNT: ${{ vars.TARGET_COUNT }}
          MAX_SIZE_BYTES: ${{ vars.MAX_SIZE_BYTES }}
          MAX_WIDTH: ${{ vars.MAX_WIDTH }}
          MAX_HEIGHT: ${{ vars.MAX_HEIGHT }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
          CONCURRENCY: ${{ vars.CONCURRENCY }}
        run: node scraper.js
